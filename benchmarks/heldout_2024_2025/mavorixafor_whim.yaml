  target_protein: "CXCR4"
  target_aliases: ["CXCR4", "mavorixafor", "Xolremdi", "X4P-001"]
  modulation_type: "inhibitor"
  key_citations:
    - "mavorixafor"
    - "Xolremdi"
    - "Badolato 4WHIM"
  mechanism_class: "gof"
  min_confidence: 0.80

references:
  - "Badolato R et al. Mavorixafor in WHIM syndrome (4WHIM trial). NEJM 2024"
  - "FDA approval letter, NDA 217640, 2024-04-29"
