id: mavorixafor_whim
name: "WHIM syndrome -> mavorixafor (CXCR4 antagonist)"
category: heldout_2024
approval_date: "2024-04-29"
fda_approval: "Xolremdi (mavorixafor) -- first targeted therapy for WHIM syndrome"

input:
  gene: "CXCR4"
  mutation: "heterozygous gain-of-function truncating mutations in the CXCR4 C-terminal tail (e.g. p.R334X, p.E343X) that abolish receptor desensitization and produce persistent CXCL12 signalling"
  disease_phenotype: "WHIM syndrome (Warts, Hypogammaglobulinemia, Infections, Myelokathexis) with neutrophils retained in the bone marrow and recurrent bacterial / HPV infections"

expected_outputs:
  # Note: target == disease gene (gain-of-function CXCR4 antagonized
