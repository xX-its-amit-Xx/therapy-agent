id: sma_smn1
name: "SMA — SMN1 deletion → onasemnogene/nusinersen"
category: curated

input:
  gene: "SMN1"
  mutation: "homozygous deletion of exon 7-8 causing complete loss of survival motor neuron protein"
  disease_phenotype: "spinal muscular atrophy type 1 (SMA1) with progressive motor neuron degeneration, hypotonia, and respiratory failure"

expected_outputs:
  target_protein: "SMN2"
  # NB: SMN1 (the disease gene) was previously in this alias bag. Removed
  # because predicting the disease gene unmodified isn't a recognized FDA
  # strategy -- Spinraza targets SMN2 pre-mRNA splice site, Zolgensma
  # delivers an SMN1 transgene via AAV9 (technically SMN1 again, but the
  # therapeutic surface is the AAV-delivered cDNA, not the patient's
  # broken SMN1). Including SMN1 in aliases lets the trivial
  # disease-gene baseline auto-pass this case.
  target_aliases: ["SMN2", "onasemnogene", "nusinersen", "SMN2 pre-mRNA"]
  modulation_type: "gene_therapy"
  key_citations:
    - "onasemnogene"
    - "Zolgensma"
    - "nusinersen"
    - "Spinraza"
  mechanism_class: "lof"
  min_confidence: 0.80

references:
  - "Mendell JR et al. Single-Dose Gene-Replacement Therapy for SMA. NEJM 2017"
  - "Finkel RS et al. Nusinersen vs sham control in SMA. NEJM 2017"
  - "Baranello G et al. Risdiplam in SMA type 1. NEJM 2021"
