id: melanoma_braf
name: "BRAF-V600E melanoma -> vemurafenib / dabrafenib"
category: canonical_oncology

input:
  gene: "BRAF"
  mutation: "p.V600E activating point mutation in the kinase domain"
  disease_phenotype: "metastatic cutaneous melanoma with BRAF V600E mutation"

expected_outputs:
